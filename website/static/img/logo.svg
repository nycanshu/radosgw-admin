<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="archGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="40" fill="#0f172a"/>

  <!-- Left pillar -->
  <rect x="48" y="62" width="28" height="88" rx="10" fill="url(#pillGrad)" filter="url(#glow)"/>

  <!-- Right pillar -->
  <rect x="124" y="62" width="28" height="88" rx="10" fill="url(#pillGrad)" filter="url(#glow)"/>

  <!-- Gateway arch -->
  <path
    d="M76 78 Q100 36 124 78"
    fill="none"
    stroke="url(#archGrad)"
    stroke-width="10"
    stroke-linecap="round"
    filter="url(#glow)"
  />

  <!-- Center dot — the "gateway" entry point -->
  <circle cx="100" cy="116" r="7" fill="#2dd4bf" opacity="0.9" filter="url(#glow)"/>

  <!-- Subtle horizontal connector line -->
  <line x1="76" y1="116" x2="124" y2="116" stroke="#2dd4bf" stroke-width="2" opacity="0.25" stroke-dasharray="4 4"/>
</svg>
